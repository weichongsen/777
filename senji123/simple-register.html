<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简化注册测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: #1a1a2e;
            color: #fff;
        }
        form {
            background: #2a2a4e;
            padding: 20px;
            border-radius: 10px;
        }
        input {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #444;
            border-radius: 5px;
            background: #1a1a2e;
            color: #fff;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #00aaff;
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
        }
        button:disabled {
            background: #444;
            cursor: not-allowed;
        }
        #logs {
            background: #1a1a2e;
            padding: 10px;
            border-radius: 5px;
            height: 200px;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 12px;
        }
        .link {
            margin-top: 10px;
            text-align: center;
        }
        .link a {
            color: #00aaff;
        }
    </style>
</head>
<body>
    <h1>简化注册测试</h1>
    
    <form id="registerForm">
        <input type="text" id="username" placeholder="用户名" required>
        <input type="email" id="email" placeholder="邮箱" required>
        <input type="password" id="password" placeholder="密码" required>
        <input type="password" id="confirmPassword" placeholder="确认密码" required>
        <button type="submit" id="registerBtn">注册</button>
    </form>
    
    <div class="link">
        <a href="login.html">已有账号？立即登录</a>
    </div>
    
    <div id="logs"></div>

    <script src="lib/supabase.js"></script>
    <script>
        const URL = 'https://kltgecxywsajonxjsawz.supabase.co';
        const KEY = 'sb_publishable_3C8V8U4lPZUQ0xDYFzBLWA_2I_yR6q8';
        
        let client = null;
        
        function log(message) {
            const logs = document.getElementById('logs');
            logs.innerHTML += `[${new Date().toLocaleTimeString()}] ${message}\n`;
            logs.scrollTop = logs.scrollHeight;
            console.log(message);
        }
        
        async function init() {
            log('注册页面开始初始化...');
            log('当前页面:', window.location.pathname);
            
            if (typeof window.supabase === 'undefined') {
                log('错误：Supabase SDK 未加载');
                return;
            }
            
            try {
                client = window.supabase.createClient(URL, KEY, {
                    auth: {
                        persistSession: true,
                        autoRefreshToken: true
                    }
                });
                log('Supabase 客户端创建成功');
                
                // 检查是否已登录
                const { data: { session } } = await client.auth.getSession();
                if (session) {
                    log('已登录，跳转到首页');
                    window.location.href = 'index.html';
                } else {
                    log('未登录，保持在注册页面');
                }
            } catch (err) {
                log('初始化失败: ' + err.message);
            }
        }
        
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('registerBtn');
            
            if (password !== confirmPassword) {
                log('错误：两次密码不一致');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '注册中...';
            
            log('开始注册，邮箱: ' + email);
            
            try {
                const { data, error } = await client.auth.signUp({
                    email,
                    password,
                    options: {
                        data: { username }
                    }
                });
                
                if (error) {
                    log('注册失败: ' + error.message);
                } else if (data && data.user) {
                    log('注册成功！用户ID: ' + data.user.id);
                    log('是否有会话: ' + (data.session ? '是' : '否'));
                    
                    if (data.session) {
                        setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                    } else {
                        log('需要邮箱验证');
                        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                    }
                }
            } catch (err) {
                log('注册异常: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.textContent = '注册';
            }
        });
        
        // 页面加载后初始化
        window.addEventListener('load', init);
        
        // 添加页面跳转追踪
        window.addEventListener('beforeunload', function(e) {
            log('页面即将跳转，原因: ' + (e.type || 'unknown'));
        });
    </script>
</body>
</html>
