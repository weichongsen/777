<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI彩票预测专家 - 系统设置</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
    <div class="particle-background"></div>
    <div class="moon-rays"></div>
    <div class="hud-scanlines"></div>
    
    <nav class="cyber-nav admin-nav">
        <div class="nav-logo">
            <span class="logo-icon">ADMIN</span>
            <span class="logo-text">管理员后台</span>
        </div>
        <div class="nav-menu">
            <a href="admin.html" class="nav-item">数据管理</a>
            <a href="admin-users.html" class="nav-item">用户管理</a>
            <a href="admin-vip.html" class="nav-item">VIP管理</a>
            <a href="admin-settings.html" class="nav-item active">系统设置</a>
        </div>
        <div class="nav-user">
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">系统设置</h1>
        <p class="page-subtitle">配置系统全局参数</p>
    </header>

    <main class="admin-container">
        <div class="admin-grid">
            <div class="admin-card">
                <div class="card-header">
                    <span class="card-icon">🌐</span>
                    <h3>网站设置</h3>
                </div>
                <div class="card-content">
                    <div class="setting-form">
                        <div class="form-group">
                            <label>网站标题</label>
                            <input type="text" class="form-input" value="AI彩票预测专家">
                        </div>
                        <div class="form-group">
                            <label>网站副标题</label>
                            <input type="text" class="form-input" value="Cyberpunk Ultimate Edition">
                        </div>
                        <div class="form-group">
                            <label>网站域名</label>
                            <input type="text" class="form-input" value="ailottery.example.com">
                        </div>
                        <button class="setting-btn">保存设置</button>
                    </div>
                </div>
            </div>

            <div class="admin-card">
                <div class="card-header">
                    <span class="card-icon">🔐</span>
                    <h3>安全设置</h3>
                </div>
                <div class="card-content">
                    <div class="security-options">
                        <div class="security-item">
                            <span class="security-label">开启验证码</span>
                            <label class="toggle-switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="security-item">
                            <span class="security-label">登录失败锁定</span>
                            <label class="toggle-switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="security-item">
                            <span class="security-label">SSL强制</span>
                            <label class="toggle-switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="admin-card">
                <div class="card-header">
                    <span class="card-icon">📧</span>
                    <h3>邮件设置</h3>
                </div>
                <div class="card-content">
                    <div class="email-form">
                        <div class="form-group">
                            <label>SMTP服务器</label>
                            <input type="text" class="form-input" value="smtp.example.com">
                        </div>
                        <div class="form-group">
                            <label>SMTP端口</label>
                            <input type="number" class="form-input" value="465">
                        </div>
                        <div class="form-group">
                            <label>发件人邮箱</label>
                            <input type="email" class="form-input" value="noreply@example.com">
                        </div>
                        <button class="email-btn">测试发送</button>
                        <button class="email-btn primary">保存设置</button>
                    </div>
                </div>
            </div>

            <div class="admin-card">
                <div class="card-header">
                    <span class="card-icon">🔄</span>
                    <h3>数据备份</h3>
                </div>
                <div class="card-content">
                    <button class="backup-btn" id="manualBackup">手动备份</button>
                    <div class="backup-info">
                        <span class="backup-label">自动备份:</span>
                        <span class="backup-value">每日 02:00</span>
                    </div>
                    <div class="backup-info">
                        <span class="backup-label">最后备份:</span>
                        <span class="backup-value">2024-06-20 02:00</span>
                    </div>
                    <button class="backup-btn" id="restoreBackup">恢复备份</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="cyber-footer">
        <p>AI彩票预测专家 Pro Max - 管理员后台</p>
        <p class="disclaimer">免责声明：所有AI计算仅为历史数据统计，不保证开奖结果</p>
    </footer>

    <!-- Supabase Client Library -->
    <script src="lib/supabase.js"></script>
    <script src="scripts/global.js"></script>
    <script src="scripts/admin.js"></script>
</body>
</html>
