<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI彩票预测专家 - 个人中心</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/profile.css">
</head>
<body>
    <div class="particle-background"></div>
    <div class="moon-rays"></div>
    <div class="hud-scanlines"></div>
    
    <nav class="cyber-nav">
        <div class="nav-logo">
            <span class="logo-icon">AI</span>
            <span class="logo-text">彩票预测专家</span>
        </div>
        <div class="nav-menu">
            <a href="index.html" class="nav-item">控制中心</a>
            <a href="lotto.html" class="nav-item">大乐透</a>
            <a href="double-color.html" class="nav-item">双色球</a>
            <a href="predictions.html" class="nav-item">预测中心</a>
            <a href="analysis.html" class="nav-item">数据分析</a>
            <a href="ai-lab.html" class="nav-item">AI实验室</a>
            <a href="visualization.html" class="nav-item">可视化</a>
            <a href="lottery-sim.html" class="nav-item">摇奖模拟</a>
        </div>
        <div class="nav-user">
            <a href="profile.html" class="user-icon active">👤</a>
            <a href="admin.html" class="admin-icon">⚙️</a>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">用户个人中心</h1>
        <p class="page-subtitle">管理您的账户信息</p>
    </header>

    <main class="profile-container">
        <div class="profile-section">
            <div class="profile-header">
                <div class="avatar">
                    <span class="avatar-icon">👤</span>
                </div>
                <div class="profile-info">
                    <h2 class="username">AI预测专家</h2>
                    <p class="user-email">user@example.com</p>
                    <div class="user-level">
                        <span class="level-badge">VIP</span>
                        <span class="level-text">高级会员</span>
                    </div>
                </div>
            </div>

            <div class="profile-stats">
                <div class="stat-card">
                    <span class="stat-value">128</span>
                    <span class="stat-label">预测次数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">25</span>
                    <span class="stat-label">收藏号码</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">92.3%</span>
                    <span class="stat-label">平均评分</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">365</span>
                    <span class="stat-label">连续登录</span>
                </div>
            </div>
        </div>

        <div class="tabs-container">
            <div class="tabs-header">
                <button class="tab-btn active" id="infoTab">基本信息</button>
                <button class="tab-btn" id="securityTab">安全设置</button>
                <button class="tab-btn" id="privacyTab">隐私设置</button>
            </div>

            <div class="tabs-content">
                <div class="tab-panel active" id="infoPanel">
                    <form class="profile-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>用户名</label>
                                <input type="text" value="AI预测专家" class="form-input">
                            </div>
                            <div class="form-group">
                                <label>昵称</label>
                                <input type="text" value="预测达人" class="form-input">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>邮箱</label>
                            <input type="email" value="user@example.com" class="form-input">
                        </div>
                        <div class="form-group">
                            <label>手机号</label>
                            <input type="tel" value="138****8888" class="form-input">
                        </div>
                        <div class="form-group">
                            <label>简介</label>
                            <textarea class="form-textarea">热爱彩票数据分析，相信数据的力量</textarea>
                        </div>
                        <button type="submit" class="submit-btn">保存修改</button>
                    </form>
                </div>

                <div class="tab-panel" id="securityPanel">
                    <div class="security-options">
                        <div class="security-item">
                            <div class="security-info">
                                <span class="security-icon">🔐</span>
                                <span class="security-label">修改密码</span>
                            </div>
                            <button class="security-btn">修改</button>
                        </div>
                        <div class="security-item">
                            <div class="security-info">
                                <span class="security-icon">📱</span>
                                <span class="security-label">绑定手机</span>
                            </div>
                            <button class="security-btn">绑定</button>
                        </div>
                        <div class="security-item">
                            <div class="security-info">
                                <span class="security-icon">🔑</span>
                                <span class="security-label">双重认证</span>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="tab-panel" id="privacyPanel">
                    <div class="privacy-options">
                        <div class="privacy-item">
                            <div class="privacy-info">
                                <span class="privacy-icon">👁️</span>
                                <span class="privacy-label">允许推荐预测</span>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox" checked>
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="privacy-item">
                            <div class="privacy-info">
                                <span class="privacy-icon">📢</span>
                                <span class="privacy-label">接收通知</span>
                            </div>
                            <label class="toggle-switch">
                                <input type="checkbox">
                                <span class="slider"></span>
                            </label>
                        </div>
                        <div class="privacy-item">
                            <div class="privacy-info">
                                <span class="privacy-icon">💾</span>
                                <span class="privacy-label">数据备份</span>
                            </div>
                            <button class="privacy-btn">立即备份</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="quick-links">
            <button class="link-btn" onclick="location.href='favorites.html'">
                <span class="link-icon">❤️</span>
                <span>我的收藏</span>
            </button>
            <button class="link-btn" onclick="location.href='history.html'">
                <span class="link-icon">📜</span>
                <span>预测历史</span>
            </button>
            <button class="link-btn" onclick="location.href='vip.html'">
                <span class="link-icon">⭐</span>
                <span>升级VIP</span>
            </button>
            <button class="link-btn danger" onclick="logout()">
                <span class="link-icon">🚪</span>
                <span>退出登录</span>
            </button>
        </div>
    </main>

    <footer class="cyber-footer">
        <p>AI彩票预测专家 Pro Max - Cyberpunk Ultimate Edition</p>
        <p class="disclaimer">免责声明：所有AI计算仅为历史数据统计，不保证开奖结果</p>
    </footer>

    <!-- Supabase Client Library -->
    <script src="lib/supabase.js"></script>
    <script src="scripts/global.js"></script>
    <script src="scripts/profile.js"></script>
</body>
</html>
