<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI彩票预测专家 - VIP管理</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
    <div class="particle-background"></div>
    <div class="moon-rays"></div>
    <div class="hud-scanlines"></div>
    
    <nav class="cyber-nav admin-nav">
        <div class="nav-logo">
            <span class="logo-icon">ADMIN</span>
            <span class="logo-text">管理员后台</span>
        </div>
        <div class="nav-menu">
            <a href="admin.html" class="nav-item">数据管理</a>
            <a href="admin-users.html" class="nav-item">用户管理</a>
            <a href="admin-vip.html" class="nav-item active">VIP管理</a>
            <a href="admin-settings.html" class="nav-item">系统设置</a>
        </div>
        <div class="nav-user">
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">VIP管理</h1>
        <p class="page-subtitle">管理VIP会员和权限</p>
    </header>

    <main class="admin-container">
        <div class="vip-stats">
            <div class="stat-card">
                <span class="stat-value">89</span>
                <span class="stat-label">VIP用户</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">¥12,500</span>
                <span class="stat-label">本月收入</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">15</span>
                <span class="stat-label">即将到期</span>
            </div>
        </div>

        <div class="admin-grid">
            <div class="admin-card">
                <div class="card-header">
                    <span class="card-icon">🎫</span>
                    <h3>VIP套餐管理</h3>
                </div>
                <div class="card-content">
                    <div class="package-list">
                        <div class="package-item">
                            <h4>高级会员</h4>
                            <p>¥29/月</p>
                            <button class="package-action">编辑</button>
                        </div>
                        <div class="package-item">
                            <h4>至尊会员</h4>
                            <p>¥99/月</p>
                            <button class="package-action">编辑</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="admin-card">
                <div class="card-header">
                    <span class="card-icon">➕</span>
                    <h3>手动开通VIP</h3>
                </div>
                <div class="card-content">
                    <div class="vip-form">
                        <div class="form-group">
                            <label>用户ID</label>
                            <input type="text" class="form-input" placeholder="输入用户ID">
                        </div>
                        <div class="form-group">
                            <label>VIP等级</label>
                            <select class="form-input">
                                <option>高级会员</option>
                                <option>至尊会员</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>有效期(天)</label>
                            <input type="number" class="form-input" value="30">
                        </div>
                        <button class="vip-btn">开通VIP</button>
                    </div>
                </div>
            </div>

            <div class="admin-card wide-card">
                <div class="card-header">
                    <span class="card-icon">📋</span>
                    <h3>VIP用户列表</h3>
                </div>
                <div class="card-content">
                    <div class="vip-user-list">
                        <div class="vip-user-item">
                            <div class="vip-user-info">
                                <span class="vip-username">AI预测专家</span>
                                <span class="vip-email">user@example.com</span>
                            </div>
                            <div class="vip-user-plan">至尊会员</div>
                            <div class="vip-user-expire">2024-12-31</div>
                            <button class="vip-user-action">续费</button>
                            <button class="vip-user-action cancel">取消</button>
                        </div>
                        <div class="vip-user-item">
                            <div class="vip-user-info">
                                <span class="vip-username">彩票爱好者</span>
                                <span class="vip-email">lottery@mail.com</span>
                            </div>
                            <div class="vip-user-plan">高级会员</div>
                            <div class="vip-user-expire">2024-07-20</div>
                            <button class="vip-user-action">续费</button>
                            <button class="vip-user-action cancel">取消</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="cyber-footer">
        <p>AI彩票预测专家 Pro Max - 管理员后台</p>
        <p class="disclaimer">免责声明：所有AI计算仅为历史数据统计，不保证开奖结果</p>
    </footer>

    <!-- Supabase Client Library -->
    <script src="lib/supabase.js"></script>
    <script src="scripts/global.js"></script>
    <script src="scripts/admin.js"></script>
</body>
</html>
