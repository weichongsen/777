<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI彩票预测专家 - 摇奖模拟中心</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/lottery-sim.css">
</head>
<body>
    <div class="particle-background"></div>
    <div class="moon-rays"></div>
    <div class="hud-scanlines"></div>
    
    <nav class="cyber-nav">
        <div class="nav-logo">
            <span class="logo-icon">AI</span>
            <span class="logo-text">彩票预测专家</span>
        </div>
        <div class="nav-menu">
            <a href="index.html" class="nav-item">控制中心</a>
            <a href="lotto.html" class="nav-item">大乐透</a>
            <a href="double-color.html" class="nav-item">双色球</a>
            <a href="predictions.html" class="nav-item">预测中心</a>
            <a href="analysis.html" class="nav-item">数据分析</a>
            <a href="ai-lab.html" class="nav-item">AI实验室</a>
            <a href="visualization.html" class="nav-item">可视化</a>
            <a href="lottery-sim.html" class="nav-item active">摇奖模拟</a>
        </div>
        <div class="nav-user">
            <a href="profile.html" class="user-icon">👤</a>
            <a href="admin.html" class="admin-icon">⚙️</a>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">摇奖模拟中心</h1>
        <p class="page-subtitle">沉浸式摇奖体验</p>
    </header>

    <main class="lottery-sim-container">
        <div class="sim-section">
            <div class="lottery-selector">
                <button class="selector-btn active" id="lottoSelector">大乐透</button>
                <button class="selector-btn" id="doubleColorSelector">双色球</button>
            </div>

            <div class="lottery-machine">
                <div class="machine-container">
                    <div class="machine-glass">
                        <div class="number-ball" id="ball1">01</div>
                        <div class="number-ball" id="ball2">02</div>
                        <div class="number-ball" id="ball3">03</div>
                        <div class="number-ball" id="ball4">04</div>
                        <div class="number-ball" id="ball5">05</div>
                        <div class="number-ball special" id="ball6">06</div>
                        <div class="number-ball special" id="ball7">07</div>
                    </div>
                    <div class="machine-base">
                        <div class="lever-container">
                            <button class="lever" id="startLever">
                                <span class="lever-icon">🎰</span>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="drawn-balls">
                    <div class="drawn-section">
                        <span class="section-label">前区 / 红球</span>
                        <div class="drawn-slots" id="drawnFront">
                            <div class="slot empty"></div>
                            <div class="slot empty"></div>
                            <div class="slot empty"></div>
                            <div class="slot empty"></div>
                            <div class="slot empty"></div>
                        </div>
                    </div>
                    <div class="drawn-section special-section">
                        <span class="section-label">后区 / 蓝球</span>
                        <div class="drawn-slots" id="drawnBack">
                            <div class="slot empty"></div>
                            <div class="slot empty"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls">
                <button class="control-btn primary" id="startBtn">
                    <span class="btn-icon">🎲</span>
                    <span>开始摇奖</span>
                </button>
                <button class="control-btn" id="resetBtn">
                    <span class="btn-icon">🔄</span>
                    <span>重置</span>
                </button>
                <button class="control-btn" id="autoBtn">
                    <span class="btn-icon">⚡</span>
                    <span>自动连摇</span>
                </button>
            </div>

            <div class="settings">
                <label class="setting-item">
                    <input type="checkbox" id="soundEnabled" checked>
                    <span>音效</span>
                </label>
                <label class="setting-item">
                    <input type="checkbox" id="animationEnabled" checked>
                    <span>动画</span>
                </label>
            </div>
        </div>

        <div class="results-section">
            <h3 class="section-title">开奖结果</h3>
            <div class="results-list" id="resultsList">
                <div class="result-item">
                    <span class="result-date">2024-06-20</span>
                    <span class="result-type">大乐透</span>
                    <div class="result-balls">
                        <span class="ball red">05</span>
                        <span class="ball red">12</span>
                        <span class="ball red">18</span>
                        <span class="ball red">24</span>
                        <span class="ball red">31</span>
                        <span class="ball blue">03</span>
                        <span class="ball blue">09</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="cyber-footer">
        <p>AI彩票预测专家 Pro Max - Cyberpunk Ultimate Edition</p>
        <p class="disclaimer">免责声明：所有AI计算仅为历史数据统计，不保证开奖结果</p>
    </footer>

    <!-- Supabase Client Library -->
    <script src="lib/supabase.js"></script>
    <script src="scripts/global.js"></script>
    <script src="scripts/lottery-sim.js"></script>
</body>
</html>
