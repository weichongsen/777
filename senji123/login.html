<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI彩票模拟 - 登录</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/login.css">
</head>
<body class="login-page">
    <div class="particle-background"></div>
    <div class="moon-rays"></div>
    <div class="hud-scanlines"></div>
    
    <div class="login-container">
        <div class="login-header">
            <h1 class="login-title">AI彩票模拟</h1>
            <p class="login-subtitle">Cyberpunk Ultimate Edition</p>
            <div class="login-ai-core">
                <div class="core-ring"></div>
                <div class="core-ring"></div>
                <div class="core-center">AI</div>
            </div>
        </div>
        
        <form class="login-form" id="loginForm">
            <div class="form-group">
                <label class="form-label">邮箱地址</label>
                <input type="email" class="form-input" id="email" placeholder="请输入邮箱" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">密码</label>
                <input type="password" class="form-input" id="password" placeholder="请输入密码" required>
            </div>
            
            <div class="form-group">
                <label class="form-checkbox">
                    <input type="checkbox" id="rememberMe">
                    <span>记住我</span>
                </label>
            </div>
            
            <button type="submit" class="form-btn">
                <span class="btn-text">登录</span>
                <span class="btn-icon">→</span>
            </button>
            
            <div class="form-link">
                <a href="register.html">还没有账号？立即注册</a>
            </div>
            
            <div class="form-divider">
                <span>或</span>
            </div>
            
            <div class="social-login">
                <button type="button" class="social-btn google">
                    <span>Google</span>
                </button>
                <button type="button" class="social-btn github">
                    <span>Github</span>
                </button>
            </div>
        </form>
        
        <div class="login-footer">
            <p class="disclaimer">免责声明：所有AI计算仅为历史数据统计，不保证开奖结果</p>
        </div>
    </div>
    
    <!-- Supabase Client Library -->
    <script src="lib/supabase.js"></script>
    <script src="scripts/global.js"></script>
    <script src="scripts/login.js"></script>
</body>
</html>
