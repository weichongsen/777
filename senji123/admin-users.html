<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI彩票预测专家 - 用户管理</title>
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/admin.css">
</head>
<body>
    <div class="particle-background"></div>
    <div class="moon-rays"></div>
    <div class="hud-scanlines"></div>
    
    <nav class="cyber-nav admin-nav">
        <div class="nav-logo">
            <span class="logo-icon">ADMIN</span>
            <span class="logo-text">管理员后台</span>
        </div>
        <div class="nav-menu">
            <a href="admin.html" class="nav-item">数据管理</a>
            <a href="admin-users.html" class="nav-item active">用户管理</a>
            <a href="admin-vip.html" class="nav-item">VIP管理</a>
            <a href="admin-settings.html" class="nav-item">系统设置</a>
        </div>
        <div class="nav-user">
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
    </nav>

    <header class="page-header">
        <h1 class="page-title">用户管理</h1>
        <p class="page-subtitle">管理所有用户账户</p>
    </header>

    <main class="admin-container">
        <div class="search-section">
            <div class="search-box">
                <input type="text" placeholder="搜索用户..." id="userSearch">
                <button class="search-btn">搜索</button>
            </div>
            <div class="filter-btns">
                <button class="filter-btn active">全部</button>
                <button class="filter-btn">普通用户</button>
                <button class="filter-btn">VIP用户</button>
                <button class="filter-btn">管理员</button>
            </div>
        </div>

        <div class="user-stats">
            <div class="stat-card">
                <span class="stat-value">1,234</span>
                <span class="stat-label">总用户</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">567</span>
                <span class="stat-label">今日新增</span>
            </div>
            <div class="stat-card">
                <span class="stat-value">89%</span>
                <span class="stat-label">活跃度</span>
            </div>
        </div>

        <div class="user-table-container">
            <table class="user-table">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>用户名</th>
                        <th>邮箱</th>
                        <th>等级</th>
                        <th>注册时间</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>001</td>
                        <td>AI预测专家</td>
                        <td>user@example.com</td>
                        <td><span class="level-badge vip">VIP</span></td>
                        <td>2024-01-15</td>
                        <td><span class="status active">活跃</span></td>
                        <td>
                            <button class="table-action">编辑</button>
                            <button class="table-action delete">删除</button>
                        </td>
                    </tr>
                    <tr>
                        <td>002</td>
                        <td>数据分析员</td>
                        <td>data@test.com</td>
                        <td><span class="level-badge free">免费</span></td>
                        <td>2024-03-20</td>
                        <td><span class="status inactive">不活跃</span></td>
                        <td>
                            <button class="table-action">编辑</button>
                            <button class="table-action delete">删除</button>
                        </td>
                    </tr>
                    <tr>
                        <td>003</td>
                        <td>彩票爱好者</td>
                        <td>lottery@mail.com</td>
                        <td><span class="level-badge vip">VIP</span></td>
                        <td>2024-05-10</td>
                        <td><span class="status active">活跃</span></td>
                        <td>
                            <button class="table-action">编辑</button>
                            <button class="table-action delete">删除</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div class="pagination">
            <button class="page-btn" disabled>上一页</button>
            <span class="page-current">1</span>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">下一页</button>
        </div>
    </main>

    <footer class="cyber-footer">
        <p>AI彩票预测专家 Pro Max - 管理员后台</p>
        <p class="disclaimer">免责声明：所有AI计算仅为历史数据统计，不保证开奖结果</p>
    </footer>

    <!-- Supabase Client Library -->
    <script src="lib/supabase.js"></script>
    <script src="scripts/global.js"></script>
    <script src="scripts/admin.js"></script>
</body>
</html>
